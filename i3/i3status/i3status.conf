###############################################################################
# i3status configuration file.
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# Гџ
# If the above line is not correctly displayed, fix your editor first!
###############################################################################

general {
        colors = true
        interval = 5
        color_good = "#00FF00" # Green
        color_degraded = "#fafe7c" # Light yellow
        color_bad = "#ff7770" # Light red
}

order += "window"
order += "disk /home"
order += "disk /"
order += "memory"
order += "wireless _first_"
order += "ethernet enp0s20f0u1"
order += "cpu_temperature 0"
order += "cpu_usage"
order += "volume master"
order += "battery_level"
order += "tztime local"

##[1]-------------------------------------------------------------------
window_title {
#    format = '{title}|\u2665'
    format = '{title}|в™Ґ '
    color='color_good'
    max_width=50
}

##[2]-------------------------------------------------------------------

disk "/home" {
    format = "пЂ• %avail "
}

##[3]-------------------------------------------------------------------
cpu_temperature 0 {
	format                 = "п‹‰ %degrees В°C "
	path                   = "/sys/class/thermal/thermal_zone0/temp"
	max_threshold          = 75
	format_above_threshold = "пќ© %degrees вЃ°C "
}

##[4]-------------------------------------------------------------------
cpu_usage {
	format                 = "п‹› %usage "
	max_threshold          = 75
	format_above_threshold = "п‹› %usage "
}

##[5]-------------------------------------------------------------------
wireless _first_ {
        format_up = "п‡« [%quality at %essid] "
        format_down = "п‡« Down "
}

##[6]-------------------------------------------------------------------
ethernet enp0s20f0u1 {
        # if you use %speed, i3status requires root privileges
        format_up = " п‚¬ %ip [%speed]"
        format_down = ""
}

##[7]-------------------------------------------------------------------
battery_level {
	blocks = "п‰„п‰ѓп‰ѓп‰‚п‰Ѓп‰Ѓп‰Ђп‰Ђп‰Ђ"
	charging_character = "вљЎ"
	format = "{icon} {percent}%"
	format_notify_charging = "Charging ({percent}%)"
	hide_when_full = False
	sys_battery_path = "/sys/class/power_supply/"
	format_status_full = "FULL"
	format_notify_discharging = "{time_remaining}"
	measurement_mode = 'sys'
}

##[8]-------------------------------------------------------------------
volume master {
        format = "рџ”Љ %volume "
        format_muted = "рџ”€ Muted "
        device = "default"
        mixer = "Master"
        mixer_idx = 0
}

##[9]-------------------------------------------------------------------
disk "/" {
        format = "п‚  %avail "
}

##[10]-------------------------------------------------------------------
memory {
        format = "п”ё %used | %available "
        threshold_degraded = "1G"
        format_degraded = "MEMORY < %available "
}

##[11]-------------------------------------------------------------------
tztime local {
        format = "пЂ— %H:%M"   
          
}
